services:
  - type: web
    name: astro-dr-harshit-rajveer-api
    runtime: node
    rootDir: Aacharya-website/server
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false          # Set this manually in Render dashboard
      - key: CLIENT_URL
        sync: false          # Set to your Vercel frontend URL
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        sync: false          # 64-char hex string — set in Render dashboard
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: 587
      - key: EMAIL_USER
        sync: false          # Set in Render dashboard
      - key: EMAIL_PASS
        sync: false          # Gmail app password — set in Render dashboard
